name: Libenvpp CI

on: [push, pull_request]

jobs:
  build-and-test-unix:
    strategy:
      matrix:
        build-type: [Debug, Release]
        compiler: [g++, clang++]
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configure CMake
      run: cmake -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}

    - name: Build
      run: cmake --build ${{ github.workspace }}/build --config ${{ matrix.build-type }}

    - name: Run tests
      working-directory: ${{ github.workspace }}/build
      run: ctest -C ${{ matrix.build-type }}

  build-and-test-windows:
    strategy:
      matrix:
        build-type: [Debug, Release]
        os: [windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configure CMake
      run: cmake -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ matrix.build-type }}

    - name: Build
      run: cmake --build ${{ github.workspace }}/build --config ${{ matrix.build-type }}

    - name: Run tests
      working-directory: ${{ github.workspace }}/build
      run: ctest -C ${{ matrix.build-type }}

  build-and-test-mingw:
    strategy:
      matrix:
        build-type: [Debug, Release]
        compiler: [g++, clang++]
        os: [windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: msys2/setup-msys2@v2
      with:
        install: mingw-w64-x86_64-cmake mingw-w64-x86_64-gcc mingw-w64-x86_64-clang
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configure CMake
      shell: msys2 {0}
      run: cmake -B "${{ github.workspace }}/build" -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}

    - name: Build
      shell: msys2 {0}
      run: cmake --build "${{ github.workspace }}/build" --config ${{ matrix.build-type }}

    - name: Run tests
      shell: msys2 {0}
      working-directory: "${{ github.workspace }}/build"
      run: ctest -C ${{ matrix.build-type }}

  integration-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install system fmt
      run: sudo apt-get update && sudo apt-get install -y libfmt-dev

    - name: Run integration tests
      working-directory: ${{ github.workspace }}/cmake_integration_test
      run: bash test_all.sh
